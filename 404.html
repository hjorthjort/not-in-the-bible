<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting | None Of These Words Are In The Bible</title>
    <meta
      name="description"
      content="Static fallback page for tweet and word deep links."
    />
    <link rel="stylesheet" href="/styles.css" />
    <script>
      (function () {
        var requestedPath = window.location.pathname + window.location.search + window.location.hash;
        if (requestedPath === "/404.html") {
          return;
        }

        var redirectTarget = new URL("/", window.location.origin);
        redirectTarget.searchParams.set("__redirect", requestedPath);
        window.location.replace(redirectTarget.toString());
      })();
    </script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <a class="hero__home" href="/">None Of These Words Are In The Bible</a>
        <p class="hero__kicker">modernityslop verifier</p>
      </header>

      <main class="app-shell" aria-live="polite">
        <section class="panel panel--error">
          <p class="error-code">Static redirect</p>
          <h1>Finding that page…</h1>
          <p>If JavaScript is enabled, this host should redirect you to the matching app route automatically.</p>
        </section>
      </main>
    </div>
  </body>
</html>
