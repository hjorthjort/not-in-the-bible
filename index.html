<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>None Of These Words Are In The Bible</title>
    <meta
      name="description"
      content="Paste a tweet link and check which words appear in the Bible."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <a class="hero__home" href="/" aria-label="None Of These Words Are In The Bible">
          <span class="hero__line">None Of These Words</span>
          <span class="hero__line">Are In The</span>
          <img class="hero__bible-word" src="/assets/bible-wordmark.png" alt="Bible" />
        </a>
        <p class="hero__kicker">modernityslop verifier</p>
        <form id="tweet-form" class="tweet-form" autocomplete="off">
          <label class="select-wrap" for="bible-source">
            <span class="sr-only">Bible source</span>
            <select id="bible-source" name="bible-source"></select>
          </label>
          <label class="sr-only" for="tweet-url">Tweet URL</label>
          <input
            id="tweet-url"
            name="tweet-url"
            type="url"
            placeholder="https://x.com/user/status/1234567890"
            required
          />
          <button type="submit">Analyze</button>
        </form>
        <p id="bible-source-name" class="source-selected" aria-live="polite"></p>
      </header>

      <main id="app" class="app-shell" aria-live="polite"></main>
    </div>

    <div id="tooltip" class="tooltip" hidden></div>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <script src="/app-config.js"></script>
    <script type="module" src="/dist/app.js"></script>
  </body>
</html>
